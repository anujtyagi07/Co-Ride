# ───────────────────────────────────────────────────────────────────────────
# Co-Ride Render Blueprint
#
# Deploy with: https://render.com/deploy?repo=https://github.com/YOUR/co-ride
#
# This creates two services:
#   1. co-ride-backend  — Node web service running the Express API + Socket.IO
#   2. co-ride-frontend — Static site serving the built React app
#
# Required secrets to set in the Render dashboard (or via envFileGroup):
#   - MONGODB_URI       (MongoDB Atlas connection string)
#   - JWT_SECRET        (random 48+ chars)
#   - JWT_REFRESH_SECRET (random 48+ chars, different from JWT_SECRET)
#   - RAZORPAY_KEY_ID, RAZORPAY_KEY_SECRET (test or live)
#   - SMTP_USER, SMTP_PASS (Gmail app password)
# Optional:
#   - CLOUDINARY_* (for cloud media storage)
#   - GOOGLE_MAPS_API_KEY
# ───────────────────────────────────────────────────────────────────────────

services:
  - type: web
    name: co-ride-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm run start:long
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: '10000'
      - key: DEPLOYMENT_MODE
        value: long-running
      - key: ENABLE_SOCKET
        value: 'true'
      - key: CLIENT_URL
        value: https://co-ride-frontend.onrender.com
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: '587'
      - key: MAIL_FROM
        value: noreply@coride.com
      - key: MAX_UPLOAD_SIZE_MB
        value: '10'
      - key: RATE_LIMIT_MAX
        value: '200'

  - type: web
    name: co-ride-frontend
    runtime: static
    rootDir: frontend
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      - key: VITE_API_URL
        value: https://co-ride-backend.onrender.com/api
      - key: VITE_SOCKET_URL
        value: https://co-ride-backend.onrender.com
      - key: VITE_RAZORPAY_KEY_ID
        sync: false
      - key: VITE_GOOGLE_MAPS_API_KEY
        sync: false
